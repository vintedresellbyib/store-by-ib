<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Store by IB</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1f1f1f);
      color: white;
      text-align: center;
    }

    .box {
      margin-top: 120px;
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    p {
      font-size: 20px;
      color: #aaa;
    }

    .btn {
      margin-top: 30px;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: white;
      color: black;
    }

    .btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>STORE BY IB 🔥</h1>
    <p>Tervetuloa mun sivulle</p>
    <button class="btn">Osta nyt</button>
  </div>
</body>
</html>
